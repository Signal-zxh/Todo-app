<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
</head>
<body>
    <h1>My To-Do List</h1>
    <p>这是一个待办事项列表。</p>
    <form action="/add" method="POST">
        <input type="text" name="content" placeholder="输入新任务……">
        <button type="submit">添加</button>
    </form>
    <ul>
        {% for task in tasks %}
            <li class="{% if task.done %}done{% endif %}">
                <a href="/toggle/{{ task.id }}" style="text-decoration: none;color:inherit;">
                {{ task.content }}
                </a>
                <a href="/delete/{{task.id}}" style="color:red;margin-left:10px;">✗</a>
            </li>
        {% endfor %}
    </ul>
    <style>
        .done{
            text-decoration: line-through;
            color:#888;
        }
    </style>
    <script>
        document.querySelectorAll('a[href^="/delete/"]').forEach(link => {
            link.addEventListener('click', function(e) {
                if (!confirm('确定要删除这个任务吗？')) {
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
