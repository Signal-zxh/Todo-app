{% extends "base.html" %}

{% block content %}
<h2>注册</h2>
<!-- 新增错误显示 -->
{% for error in form.username.errors %}
    <div style="color: red;">{{ error }}</div>
{% endfor %}
<form method="POST">
    {{ form.hidden_tag() }}
    <p>
        {{ form.username.label }}<br>
        {{ form.username(size=32) }}
    </p>
    <p>
        {{ form.password.label }}<br>
        {{ form.password(size=32) }}
    </p>
    <p>{{ form.submit() }}</p>
</form>
{% endblock %}
